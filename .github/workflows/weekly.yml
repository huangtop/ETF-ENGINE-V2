name: ETF Weekly Validation
on:
  workflow_dispatch:
  schedule:
    - cron: "40 23 * * 0"
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .[dev]
      - run: pytest -q
      - run: python -m etf_engine.cli validate
      - run: python -m etf_engine.cli build-public
