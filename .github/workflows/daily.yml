name: ETF Daily Pipeline
on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * 1-5"
permissions:
  contents: write
concurrency:
  group: etf-daily
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: python -m etf_engine.cli validate
      - run: python -m etf_engine.cli run --market all
      - name: Commit generated public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/public data/normalized/metrics data/state
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: refresh ETF dataset"
            git push
          fi
